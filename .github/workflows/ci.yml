name: linting
on:
  push:
    paths: "*.py"

jobs:
  Code:
    runs-on: ubuntu-latest
    steps:
      - name: clone the code   # Clone the code from the repo into this runner
        uses: actions/checkout@v7

  Test:
   runs-on: ubuntu-latest
   needs: Code
   steps:
     - name: install linter # Intstall the linet for python
       run: pip install ruff
       
     - name: check the files for lining  # This will run the linter
       run: ruff check .

  Build:
    runs-on: ubuntu-latest
    needs: Test
    steps:
      - name: Build the app
        run: echo "Build successfully"

  Deploy:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: deploy the code
        run: echo "Deployed successfully"
       
